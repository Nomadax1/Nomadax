<svg xmlns="http://www.w3.org/2000/svg" width="680" height="560" viewBox="0 0 680 560" font-family="Arial, Helvetica, sans-serif">
  <rect width="680" height="560" fill="#f5f5f3"/>
  <text x="340" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">NOMADAX VANTA 40 — VISTA EXPLOTADA (DESPIECE)</text>
  <text x="340" y="48" font-size="11" text-anchor="middle" fill="#666">Subconjuntos principales numerados</text>

  <!-- exploded stack along a diagonal -->
  <!-- helper to draw numbered layer -->
  <!-- 1 front beige flap -->
  <g>
    <rect x="120" y="80" width="150" height="90" rx="10" fill="#cbb693" stroke="#a8915f"/>
    <circle cx="115" cy="90" r="10" fill="#1c1c1e"/><text x="115" y="94" font-size="11" fill="#fff" text-anchor="middle">1</text>
    <text x="285" y="120" font-size="11" fill="#333">Tapa frontal beige + bolsillo rápido</text>
  </g>
  <!-- 2 vacuum bag -->
  <g>
    <rect x="135" y="125" width="120" height="75" rx="8" fill="#bcd4e6" stroke="#7fa7c0" opacity="0.85"/>
    <circle cx="130" cy="135" r="10" fill="#1c1c1e"/><text x="130" y="139" font-size="11" fill="#fff" text-anchor="middle">2</text>
    <text x="285" y="165" font-size="11" fill="#333">Bolsa de vacío desmontable + válvula</text>
  </g>
  <!-- 3 main U zip frame -->
  <g>
    <rect x="150" y="170" width="140" height="80" rx="10" fill="none" stroke="#555" stroke-width="2" stroke-dasharray="4 3"/>
    <circle cx="145" cy="180" r="10" fill="#1c1c1e"/><text x="145" y="184" font-size="11" fill="#fff" text-anchor="middle">3</text>
    <text x="305" y="210" font-size="11" fill="#333">Cremallera principal U (YKK AquaGuard #8)</text>
  </g>
  <!-- 4 body shell -->
  <g>
    <rect x="160" y="215" width="170" height="120" rx="12" fill="#1c1c1e" stroke="#000"/>
    <circle cx="155" cy="225" r="10" fill="#c00"/><text x="155" y="229" font-size="11" fill="#fff" text-anchor="middle">4</text>
    <text x="345" y="270" font-size="11" fill="#333">Cuerpo exterior Oxford 900D negro</text>
  </g>
  <!-- 5 perimeter frame -->
  <g>
    <rect x="170" y="225" width="150" height="100" rx="10" fill="none" stroke="#9a7" stroke-width="3"/>
    <circle cx="165" cy="320" r="10" fill="#1c1c1e"/><text x="165" y="324" font-size="11" fill="#fff" text-anchor="middle">5</text>
    <text x="345" y="300" font-size="11" fill="#333">Marco semirrígido HDPE/EVA</text>
  </g>
  <!-- 6 organization panel -->
  <g>
    <rect x="185" y="300" width="130" height="90" rx="8" fill="#2a2a2d" stroke="#444"/>
    <rect x="195" y="312" width="40" height="20" fill="#333"/><rect x="240" y="312" width="60" height="14" fill="#333"/>
    <circle cx="180" cy="345" r="10" fill="#1c1c1e"/><text x="180" y="349" font-size="11" fill="#fff" text-anchor="middle">6</text>
    <text x="330" y="350" font-size="11" fill="#333">Panel organización (cables/cargador/batería/bolis/docs)</text>
  </g>
  <!-- 7 laptop sleeve -->
  <g>
    <rect x="200" y="355" width="110" height="80" rx="8" fill="#26262a" stroke="#444"/>
    <circle cx="195" cy="365" r="10" fill="#1c1c1e"/><text x="195" y="369" font-size="11" fill="#fff" text-anchor="middle">7</text>
    <text x="325" y="395" font-size="11" fill="#333">Funda portátil 15,6" suspendida</text>
  </g>
  <!-- 8 hidden pocket -->
  <g>
    <rect x="215" y="400" width="100" height="60" rx="6" fill="#2f2f33" stroke="#c00" stroke-dasharray="4 3"/>
    <circle cx="210" cy="410" r="10" fill="#c00"/><text x="210" y="414" font-size="11" fill="#fff" text-anchor="middle">8</text>
    <text x="330" y="435" font-size="11" fill="#333">Bolsillo oculto antirrobo (espalda)</text>
  </g>
  <!-- 9 back mesh + foams -->
  <g>
    <rect x="225" y="445" width="100" height="70" rx="10" fill="#34343a" stroke="#444"/>
    <line x1="235" y1="450" x2="315" y2="510" stroke="#222" stroke-width="4"/><line x1="315" y1="450" x2="235" y2="510" stroke="#222" stroke-width="4"/>
    <circle cx="220" cy="455" r="10" fill="#1c1c1e"/><text x="220" y="459" font-size="11" fill="#fff" text-anchor="middle">9</text>
    <text x="335" y="485" font-size="11" fill="#333">Espalda malla 3D + espumas</text>
  </g>

  <!-- right column small parts 10-16 -->
  <g font-size="11" fill="#333">
    <circle cx="470" cy="90" r="10" fill="#1c1c1e"/><text x="470" y="94" font-size="11" fill="#fff" text-anchor="middle">10</text>
    <text x="488" y="94">Arnés: tirantes + Fidlock + cincha cadera</text>
    <circle cx="470" cy="130" r="10" fill="#1c1c1e"/><text x="470" y="134" font-size="11" fill="#fff" text-anchor="middle">11</text>
    <text x="488" y="134">Asa superior de gel</text>
    <circle cx="470" cy="170" r="10" fill="#1c1c1e"/><text x="470" y="174" font-size="11" fill="#fff" text-anchor="middle">12</text>
    <text x="488" y="174">Banda/correa para trolley</text>
    <circle cx="470" cy="210" r="10" fill="#1c1c1e"/><text x="470" y="214" font-size="11" fill="#fff" text-anchor="middle">13</text>
    <text x="488" y="214">Base reforzada EVA/TPU + 5 pies</text>
    <circle cx="470" cy="250" r="10" fill="#1c1c1e"/><text x="470" y="254" font-size="11" fill="#fff" text-anchor="middle">14</text>
    <text x="488" y="254">Módulo USB-C pasante + cable interno</text>
    <circle cx="470" cy="290" r="10" fill="#c00"/><text x="470" y="294" font-size="11" fill="#fff" text-anchor="middle">15</text>
    <text x="488" y="294">Candado TSA + cables de bloqueo (3 vías)</text>
    <circle cx="470" cy="330" r="10" fill="#1c1c1e"/><text x="470" y="334" font-size="11" fill="#fff" text-anchor="middle">16</text>
    <text x="488" y="334">Herrajes: cursores, tiradores, POM, reguladores</text>
  </g>

  <!-- accessory box -->
  <rect x="470" y="370" width="180" height="120" rx="8" fill="#efe9dc" stroke="#bbb"/>
  <text x="560" y="390" font-size="11" text-anchor="middle" fill="#333" font-weight="bold">Incluido en caja</text>
  <text x="480" y="412" font-size="10" fill="#444">• Mini bomba de vacío USB-C</text>
  <text x="480" y="432" font-size="10" fill="#444">• Dust bag de algodón</text>
  <text x="480" y="452" font-size="10" fill="#444">• Guía rápida + garantía</text>
  <text x="480" y="472" font-size="10" fill="#444">• (Opc.) recambio bolsa de vacío</text>

  <text x="340" y="545" font-size="9" text-anchor="middle" fill="#999">Despiece optimizado para fabricación a gran escala — nº de piezas reducido</text>
</svg>
