<svg xmlns="http://www.w3.org/2000/svg" width="380" height="520" viewBox="0 0 380 520" font-family="Arial, Helvetica, sans-serif">
  <rect width="380" height="520" fill="#f5f5f3"/>
  <text x="190" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">NOMADAX VANTA 40 — VISTA LATERAL</text>
  <text x="190" y="48" font-size="11" text-anchor="middle" fill="#666">Perfil · fondo 200 mm · USB-C · botella oculta</text>

  <!-- side profile: depth 200mm x height 400mm = 160 x 320 px. x=110 y=80 -->
  <rect x="110" y="80" width="160" height="320" rx="20" fill="#1c1c1e" stroke="#000" stroke-width="2"/>
  <rect x="110" y="80" width="160" height="320" rx="20" fill="url(#g)" opacity="0.3"/>
  <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#fff" stop-opacity="0.12"/><stop offset="1" stop-color="#000" stop-opacity="0.3"/>
  </linearGradient></defs>

  <!-- front side (right) beige edge -->
  <rect x="252" y="100" width="18" height="280" rx="8" fill="#cbb693" stroke="#a8915f"/>
  <text x="261" y="245" font-size="8" fill="#5b4a26" transform="rotate(90 261 245)">Tapa frontal</text>

  <!-- back panel (left) padding -->
  <rect x="110" y="96" width="14" height="290" rx="6" fill="#2f2f33"/>

  <!-- main U-zip along front edge -->
  <path d="M252 100 v280" fill="none" stroke="#555" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- hidden bottle pocket (elastic, side) -->
  <path d="M120 250 q-14 10 -14 40 q0 30 14 40 v-80 z" fill="#222" stroke="#555" stroke-dasharray="3 2"/>
  <text x="92" y="300" font-size="8" fill="#888" transform="rotate(90 92 300)">Bolsillo botella oculto</text>

  <!-- USB-C port lower side -->
  <rect x="106" y="360" width="10" height="8" rx="3" fill="#3a3a3d" stroke="#777"/>
  <text x="60" y="368" font-size="9" fill="#444">USB-C →</text>

  <!-- gel handle -->
  <path d="M160 78 q30 -20 50 0" fill="none" stroke="#111" stroke-width="9" stroke-linecap="round"/>
  <!-- side carry handle -->
  <rect x="262" y="150" width="8" height="44" rx="4" fill="#111"/>
  <text x="290" y="175" font-size="8" fill="#444">Asa lateral</text>

  <!-- base feet -->
  <circle cx="120" cy="402" r="3" fill="#333"/><circle cx="190" cy="404" r="3" fill="#333"/><circle cx="260" cy="402" r="3" fill="#333"/>

  <!-- dimensions -->
  <!-- depth 200 -->
  <line x1="110" y1="430" x2="270" y2="430" stroke="#c00" stroke-width="1"/>
  <line x1="110" y1="425" x2="110" y2="435" stroke="#c00"/><line x1="270" y1="425" x2="270" y2="435" stroke="#c00"/>
  <text x="190" y="445" font-size="11" text-anchor="middle" fill="#c00">200 mm (Fondo)</text>
  <!-- height 400 -->
  <line x1="92" y1="80" x2="92" y2="400" stroke="#c00"/>
  <line x1="87" y1="80" x2="97" y2="80" stroke="#c00"/><line x1="87" y1="400" x2="97" y2="400" stroke="#c00"/>
  <text x="80" y="245" font-size="11" text-anchor="middle" fill="#c00" transform="rotate(-90 80 245)">400 mm</text>

  <text x="190" y="495" font-size="9" text-anchor="middle" fill="#999">Perfil que no abomba: estructura semirrígida mantiene el gálibo</text>
</svg>
