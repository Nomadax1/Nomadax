<svg xmlns="http://www.w3.org/2000/svg" width="420" height="520" viewBox="0 0 420 520" font-family="Arial, Helvetica, sans-serif">
  <rect width="420" height="520" fill="#f5f5f3"/>
  <text x="210" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">NOMADAX VANTA 40 — VISTA TRASERA</text>
  <text x="210" y="48" font-size="11" text-anchor="middle" fill="#666">Espalda 3D · arnés · banda trolley · bolsillo oculto</text>

  <!-- body -->
  <rect x="110" y="80" width="200" height="320" rx="20" fill="#1c1c1e" stroke="#000" stroke-width="2"/>

  <!-- back padded panels (mesh 3D) with X ventilation channels -->
  <rect x="124" y="96" width="172" height="290" rx="16" fill="#262629" stroke="#3a3a3d" stroke-width="1"/>
  <!-- lumbar pads -->
  <ellipse cx="165" cy="180" rx="34" ry="80" fill="#2f2f33" stroke="#444"/>
  <ellipse cx="255" cy="180" rx="34" ry="80" fill="#2f2f33" stroke="#444"/>
  <ellipse cx="210" cy="320" rx="46" ry="44" fill="#2f2f33" stroke="#444"/>
  <!-- X channels -->
  <line x1="150" y1="120" x2="270" y2="360" stroke="#1a1a1c" stroke-width="6"/>
  <line x1="270" y1="120" x2="150" y2="360" stroke="#1a1a1c" stroke-width="6"/>
  <text x="330" y="200" font-size="9" fill="#555" transform="rotate(90 330 200)">Malla 3D transpirable</text>

  <!-- shoulder straps S-shape -->
  <path d="M150 96 C120 150 120 250 150 320 C160 350 150 380 130 396" fill="none" stroke="#1a1a1c" stroke-width="20" stroke-linecap="round"/>
  <path d="M270 96 C300 150 300 250 270 320 C260 350 270 380 290 396" fill="none" stroke="#1a1a1c" stroke-width="20" stroke-linecap="round"/>
  <text x="120" y="240" font-size="9" fill="#888" transform="rotate(-78 120 240)">Tirante ergonómico S</text>

  <!-- sternum Fidlock strap -->
  <line x1="150" y1="170" x2="270" y2="170" stroke="#444" stroke-width="3"/>
  <rect x="202" y="164" width="16" height="12" rx="3" fill="#777"/>
  <text x="210" y="158" font-size="8" text-anchor="middle" fill="#888">Hebilla Fidlock</text>

  <!-- trolley band (hidden) -->
  <rect x="124" y="250" width="172" height="22" fill="none" stroke="#888" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="210" y="265" font-size="9" text-anchor="middle" fill="#aaa">Banda para trolley (oculta)</text>

  <!-- hidden anti-theft pocket zip against back -->
  <line x1="140" y1="110" x2="280" y2="110" stroke="#c00" stroke-width="1.4" stroke-dasharray="5 3"/>
  <text x="210" y="104" font-size="9" text-anchor="middle" fill="#c00">Cremallera bolsillo OCULTO (contra la espalda)</text>

  <!-- gel handle top -->
  <path d="M180 78 q30 -22 60 0" fill="none" stroke="#111" stroke-width="9" stroke-linecap="round"/>

  <!-- dimensions -->
  <line x1="110" y1="430" x2="310" y2="430" stroke="#c00" stroke-width="1"/>
  <line x1="110" y1="425" x2="110" y2="435" stroke="#c00" stroke-width="1"/>
  <line x1="310" y1="425" x2="310" y2="435" stroke="#c00" stroke-width="1"/>
  <text x="210" y="445" font-size="11" text-anchor="middle" fill="#c00">250 mm</text>

  <text x="210" y="495" font-size="9" text-anchor="middle" fill="#999">El bolsillo oculto solo se abre con la mochila quitada</text>
</svg>
