<svg xmlns="http://www.w3.org/2000/svg" width="720" height="480" viewBox="0 0 720 480" font-family="Arial, Helvetica, sans-serif">
  <rect width="720" height="480" fill="#f5f5f3"/>
  <text x="360" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">NOMADAX VANTA 40 — APERTURA 180° (INTERIOR)</text>
  <text x="360" y="48" font-size="11" text-anchor="middle" fill="#666">Se abre plana como una maleta · interior negro</text>

  <!-- LEFT half: front flap with vacuum bag -->
  <rect x="60" y="80" width="280" height="340" rx="16" fill="#15151a" stroke="#000" stroke-width="2"/>
  <text x="200" y="100" font-size="12" text-anchor="middle" fill="#bbb" font-weight="bold">TAPA FRONTAL (lado beige)</text>
  <!-- vacuum bag in flap -->
  <rect x="90" y="120" width="220" height="180" rx="10" fill="#3a5468" stroke="#7fa7c0" opacity="0.9"/>
  <rect x="90" y="120" width="220" height="180" rx="10" fill="url(#vb)" opacity="0.5"/>
  <defs><linearGradient id="vb" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff" stop-opacity="0.3"/><stop offset="1" stop-color="#000" stop-opacity="0.2"/></linearGradient></defs>
  <text x="200" y="200" font-size="12" text-anchor="middle" fill="#fff" font-weight="bold">BOLSA DE VACÍO</text>
  <text x="200" y="218" font-size="10" text-anchor="middle" fill="#dbe8f0">desmontable · −50% volumen</text>
  <!-- valve -->
  <circle cx="290" cy="135" r="8" fill="#222" stroke="#9fc"/><text x="290" y="120" font-size="8" text-anchor="middle" fill="#666">válvula</text>
  <!-- compression mesh straps -->
  <line x1="90" y1="160" x2="310" y2="160" stroke="#0a0a0a" stroke-width="3"/>
  <line x1="90" y1="260" x2="310" y2="260" stroke="#0a0a0a" stroke-width="3"/>
  <text x="200" y="330" font-size="9" text-anchor="middle" fill="#888">Malla de compresión con cremallera (inmoviliza la carga)</text>
  <!-- clips -->
  <rect x="86" y="116" width="8" height="8" fill="#777"/><rect x="306" y="116" width="8" height="8" fill="#777"/>
  <rect x="86" y="296" width="8" height="8" fill="#777"/><rect x="306" y="296" width="8" height="8" fill="#777"/>
  <text x="200" y="350" font-size="9" text-anchor="middle" fill="#888">4 clips de sujeción → se desmonta para lavar</text>

  <!-- hinge -->
  <line x1="350" y1="80" x2="350" y2="420" stroke="#555" stroke-width="3" stroke-dasharray="6 4"/>
  <text x="360" y="250" font-size="9" fill="#888" transform="rotate(90 360 250)">Bisagra 180°</text>

  <!-- RIGHT half: back side with organization + shoes -->
  <rect x="380" y="80" width="280" height="340" rx="16" fill="#15151a" stroke="#000" stroke-width="2"/>
  <text x="520" y="100" font-size="12" text-anchor="middle" fill="#bbb" font-weight="bold">LADO ESPALDA</text>
  <!-- clothing divider -->
  <rect x="405" y="115" width="230" height="120" rx="8" fill="#222" stroke="#444"/>
  <text x="520" y="160" font-size="11" text-anchor="middle" fill="#ccc">Bandeja ropa + separador abatible</text>
  <line x1="405" y1="200" x2="635" y2="200" stroke="#444" stroke-width="2" stroke-dasharray="4 3"/>
  <!-- organization panel -->
  <rect x="405" y="245" width="110" height="100" rx="6" fill="#26262a" stroke="#444"/>
  <text x="460" y="262" font-size="8" text-anchor="middle" fill="#aaa">Organización</text>
  <line x1="412" y1="275" x2="508" y2="275" stroke="#3a8" stroke-width="3"/>
  <line x1="412" y1="290" x2="508" y2="290" stroke="#3a8" stroke-width="3"/>
  <rect x="412" y="300" width="40" height="30" fill="#333"/><rect x="460" y="300" width="48" height="30" fill="#333"/>
  <text x="460" y="358" font-size="8" text-anchor="middle" fill="#888">cables·cargador·batería·bolis·docs</text>
  <!-- mesh pockets -->
  <rect x="525" y="245" width="110" height="60" rx="6" fill="none" stroke="#3a8" stroke-dasharray="3 2"/>
  <text x="580" y="278" font-size="8" text-anchor="middle" fill="#3a8">Bolsillos malla (líquidos)</text>
  <!-- shoe compartment -->
  <rect x="525" y="315" width="110" height="55" rx="6" fill="#1a1a1f" stroke="#444"/>
  <text x="580" y="345" font-size="9" text-anchor="middle" fill="#bbb">Zapatos (ventilado)</text>

  <text x="360" y="445" font-size="10" text-anchor="middle" fill="#999">El marco perimetral mantiene la mochila abierta sola → cómodo para hacer la maleta y pasar el control</text>
</svg>
