<svg xmlns="http://www.w3.org/2000/svg" width="420" height="520" viewBox="0 0 420 520" font-family="Arial, Helvetica, sans-serif">
  <rect width="420" height="520" fill="#f5f5f3"/>
  <text x="210" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">NOMADAX VANTA 40 — VISTA FRONTAL</text>
  <text x="210" y="48" font-size="11" text-anchor="middle" fill="#666">Escala 1 cm = 8 px · 250 × 400 mm</text>

  <!-- Body: 250mm x 400mm = 200 x 320 px, centered. Origin x=110, y=80 -->
  <!-- main body negro mate -->
  <rect x="110" y="80" width="200" height="320" rx="20" fill="#1c1c1e" stroke="#000" stroke-width="2"/>
  <!-- subtle side panel shading -->
  <rect x="110" y="80" width="200" height="320" rx="20" fill="url(#g1)" opacity="0.25"/>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="0.5" stop-color="#fff" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.25"/>
    </linearGradient>
  </defs>

  <!-- TSA lock recessed top center -->
  <rect x="190" y="76" width="40" height="16" rx="4" fill="#2b2b2e" stroke="#555" stroke-width="1"/>
  <circle cx="200" cy="84" r="2" fill="#888"/><circle cx="210" cy="84" r="2" fill="#888"/><circle cx="220" cy="84" r="2" fill="#888"/>
  <text x="210" y="70" font-size="9" text-anchor="middle" fill="#444">Candado TSA</text>

  <!-- top gel handle -->
  <path d="M180 78 q30 -22 60 0" fill="none" stroke="#111" stroke-width="9" stroke-linecap="round"/>

  <!-- Beige sand front flap panel: 180mm x 280mm = 144 x 224 px -->
  <rect x="138" y="120" width="144" height="224" rx="14" fill="#cbb693" stroke="#a8915f" stroke-width="1.5"/>
  <!-- invisible U-zip line around flap -->
  <path d="M150 130 v200 a8 8 0 0 0 8 8 h104 a8 8 0 0 0 8 -8 v-200" fill="none" stroke="#8a7548" stroke-width="1" stroke-dasharray="3 2"/>
  <!-- quick access zip on flap top -->
  <line x1="150" y1="140" x2="270" y2="140" stroke="#8a7548" stroke-width="1.2" stroke-dasharray="2 2"/>
  <text x="210" y="155" font-size="9" text-anchor="middle" fill="#5b4a26">Bolsillo acceso rápido</text>
  <text x="210" y="240" font-size="11" text-anchor="middle" fill="#5b4a26" font-weight="bold">TAPA FRONTAL</text>
  <text x="210" y="256" font-size="10" text-anchor="middle" fill="#5b4a26">Beige arena premium</text>

  <!-- discreet emblem -->
  <circle cx="210" cy="315" r="6" fill="none" stroke="#5b4a26" stroke-width="1"/>
  <text x="210" y="318" font-size="6" text-anchor="middle" fill="#5b4a26">N</text>

  <!-- zipper pull cords main U -->
  <line x1="282" y1="338" x2="290" y2="355" stroke="#000" stroke-width="2"/>
  <circle cx="290" cy="357" r="3" fill="#000"/>

  <!-- base feet hint -->
  <line x1="130" y1="402" x2="290" y2="402" stroke="#444" stroke-width="3"/>
  <text x="210" y="420" font-size="9" text-anchor="middle" fill="#444">Base reforzada antideslizante</text>

  <!-- dimension lines -->
  <!-- width 250 -->
  <line x1="110" y1="445" x2="310" y2="445" stroke="#c00" stroke-width="1"/>
  <line x1="110" y1="440" x2="110" y2="450" stroke="#c00" stroke-width="1"/>
  <line x1="310" y1="440" x2="310" y2="450" stroke="#c00" stroke-width="1"/>
  <text x="210" y="460" font-size="11" text-anchor="middle" fill="#c00">250 mm (Ancho)</text>
  <!-- height 400 -->
  <line x1="90" y1="80" x2="90" y2="400" stroke="#c00" stroke-width="1"/>
  <line x1="85" y1="80" x2="95" y2="80" stroke="#c00" stroke-width="1"/>
  <line x1="85" y1="400" x2="95" y2="400" stroke="#c00" stroke-width="1"/>
  <text x="78" y="245" font-size="11" text-anchor="middle" fill="#c00" transform="rotate(-90 78 245)">400 mm (Alto)</text>

  <text x="210" y="500" font-size="9" text-anchor="middle" fill="#999">Sin logotipos grandes · líneas limpias · negro mate + tapa beige</text>
</svg>
