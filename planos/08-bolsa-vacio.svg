<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420" font-family="Arial, Helvetica, sans-serif">
  <rect width="720" height="420" fill="#f5f5f3"/>
  <text x="360" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">SISTEMA DE BOLSA DE VACÍO INTEGRADA</text>
  <text x="360" y="48" font-size="11" text-anchor="middle" fill="#666">Compresión ~50% · USB-C o manual · desmontable y lavable</text>

  <!-- Step 1: open bag with clothes -->
  <text x="130" y="80" font-size="12" text-anchor="middle" font-weight="bold" fill="#333">1 · Cargar ropa</text>
  <rect x="50" y="95" width="160" height="170" rx="10" fill="#cfe0ec" stroke="#7fa7c0"/>
  <rect x="65" y="115" width="130" height="40" rx="4" fill="#b06b5a"/>
  <rect x="65" y="160" width="130" height="35" rx="4" fill="#5a7db0"/>
  <rect x="65" y="200" width="130" height="40" rx="4" fill="#6a9a6a"/>
  <text x="130" y="285" font-size="9" text-anchor="middle" fill="#666">Cremallera estanca abierta</text>

  <!-- arrow -->
  <text x="245" y="185" font-size="24" fill="#999">→</text>

  <!-- Step 2: seal + pump -->
  <text x="360" y="80" font-size="12" text-anchor="middle" font-weight="bold" fill="#333">2 · Sellar + bombear</text>
  <rect x="280" y="95" width="160" height="170" rx="10" fill="#bcd4e6" stroke="#7fa7c0"/>
  <line x1="280" y1="110" x2="440" y2="110" stroke="#456" stroke-width="4"/>
  <text x="360" y="107" font-size="7" text-anchor="middle" fill="#fff">cremallera estanca sellada</text>
  <!-- valve -->
  <circle cx="420" cy="135" r="10" fill="#222" stroke="#9fc"/>
  <!-- pump -->
  <rect x="450" y="120" width="40" height="30" rx="6" fill="#1c1c1e"/>
  <line x1="430" y1="135" x2="450" y2="135" stroke="#333" stroke-width="3"/>
  <text x="470" y="168" font-size="8" text-anchor="middle" fill="#444">Mini bomba USB-C</text>
  <text x="360" y="285" font-size="9" text-anchor="middle" fill="#666">Válvula unidireccional de silicona</text>

  <!-- arrow -->
  <text x="510" y="185" font-size="24" fill="#999">→</text>

  <!-- Step 3: compressed -->
  <text x="610" y="80" font-size="12" text-anchor="middle" font-weight="bold" fill="#333">3 · Comprimida −50%</text>
  <rect x="545" y="150" width="130" height="80" rx="8" fill="#8fb0c8" stroke="#5a7d92"/>
  <rect x="555" y="160" width="110" height="14" rx="2" fill="#b06b5a"/>
  <rect x="555" y="178" width="110" height="12" rx="2" fill="#5a7db0"/>
  <rect x="555" y="194" width="110" height="14" rx="2" fill="#6a9a6a"/>
  <text x="610" y="285" font-size="9" text-anchor="middle" fill="#666">Bloque firme, mismo contenido</text>

  <!-- bottom notes -->
  <rect x="50" y="320" width="620" height="70" rx="8" fill="#fff" stroke="#ccc"/>
  <text x="60" y="342" font-size="10" fill="#333">• Material: TPU/nylon laminado 0,12 mm — impermeable, soldable, lavable a mano.</text>
  <text x="60" y="360" font-size="10" fill="#333">• Compresión también MANUAL: enrollar la bolsa expulsa el aire por la válvula (no requiere bomba).</text>
  <text x="60" y="378" font-size="10" fill="#333">• Desmontable: 4 clips + cremallera de marco → se extrae para limpiar o reemplazar (SKU recambio).</text>
</svg>
