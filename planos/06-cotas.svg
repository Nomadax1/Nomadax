<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520" font-family="Arial, Helvetica, sans-serif">
  <rect width="720" height="520" fill="#f5f5f3"/>
  <text x="360" y="30" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">NOMADAX VANTA 40 — PLANO ACOTADO</text>
  <text x="360" y="48" font-size="11" text-anchor="middle" fill="#666">Cotas en mm · escala 1 cm = 8 px</text>

  <!-- FRONT acotado -->
  <text x="190" y="78" font-size="12" text-anchor="middle" font-weight="bold" fill="#333">FRONTAL</text>
  <rect x="90" y="90" width="200" height="320" rx="20" fill="#1c1c1e" stroke="#000" stroke-width="2"/>
  <rect x="118" y="130" width="144" height="224" rx="12" fill="#cbb693" stroke="#a8915f"/>
  <text x="190" y="245" font-size="9" text-anchor="middle" fill="#5b4a26">Tapa 280×180</text>

  <!-- width 250 -->
  <line x1="90" y1="430" x2="290" y2="430" stroke="#c00"/>
  <line x1="90" y1="425" x2="90" y2="435" stroke="#c00"/><line x1="290" y1="425" x2="290" y2="435" stroke="#c00"/>
  <text x="190" y="445" font-size="11" text-anchor="middle" fill="#c00">250</text>
  <!-- height 400 -->
  <line x1="70" y1="90" x2="70" y2="410" stroke="#c00"/>
  <line x1="65" y1="90" x2="75" y2="90" stroke="#c00"/><line x1="65" y1="410" x2="75" y2="410" stroke="#c00"/>
  <text x="58" y="250" font-size="11" text-anchor="middle" fill="#c00" transform="rotate(-90 58 250)">400</text>
  <!-- flap height 280 -->
  <line x1="300" y1="130" x2="300" y2="354" stroke="#06c"/>
  <line x1="295" y1="130" x2="305" y2="130" stroke="#06c"/><line x1="295" y1="354" x2="305" y2="354" stroke="#06c"/>
  <text x="312" y="245" font-size="10" fill="#06c" transform="rotate(-90 312 245)">280</text>
  <!-- flap width 180 -->
  <line x1="118" y1="118" x2="262" y2="118" stroke="#06c"/>
  <line x1="118" y1="113" x2="118" y2="123" stroke="#06c"/><line x1="262" y1="113" x2="262" y2="123" stroke="#06c"/>
  <text x="190" y="112" font-size="10" text-anchor="middle" fill="#06c">180</text>

  <!-- SIDE acotado -->
  <text x="520" y="78" font-size="12" text-anchor="middle" font-weight="bold" fill="#333">LATERAL</text>
  <rect x="440" y="90" width="160" height="320" rx="20" fill="#1c1c1e" stroke="#000" stroke-width="2"/>
  <!-- depth 200 -->
  <line x1="440" y1="430" x2="600" y2="430" stroke="#c00"/>
  <line x1="440" y1="425" x2="440" y2="435" stroke="#c00"/><line x1="600" y1="425" x2="600" y2="435" stroke="#c00"/>
  <text x="520" y="445" font-size="11" text-anchor="middle" fill="#c00">200</text>
  <!-- height 400 -->
  <line x1="620" y1="90" x2="620" y2="410" stroke="#c00"/>
  <line x1="615" y1="90" x2="625" y2="90" stroke="#c00"/><line x1="615" y1="410" x2="625" y2="410" stroke="#c00"/>
  <text x="632" y="250" font-size="11" text-anchor="middle" fill="#c00" transform="rotate(-90 632 250)">400</text>

  <!-- table of dims -->
  <rect x="90" y="460" width="540" height="48" rx="6" fill="#fff" stroke="#ccc"/>
  <text x="100" y="478" font-size="10" fill="#333">Radio esquinas: 25 · Funda portátil útil: 360×250 (15,6") · Asa luz: 110×30 · Bolsillo oculto: 200×150</text>
  <text x="100" y="498" font-size="10" fill="#333">Tirante ancho hombro: 80 · Pies goma: Ø18 ×5 · Margen legal: cotas a −2/−3 mm del límite para pasar medidores</text>
</svg>
